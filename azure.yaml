environment:
  name: content-generation
  location: eastus

name: content-generation
metadata:
  template: content-generation@1.22

requiredVersions:
  azd: '>= 1.18.0 != 1.23.9'

parameters:
  solutionPrefix:
    type: string
    default: contentgen
    displayName: Solution Prefix
    description: A unique prefix for all resources (3-15 chars)
  azureAiServiceLocation:
    type: string
    default: eastus
    displayName: AI Services Location
    description: Location for Azure AI Services deployments
  enableMonitoring:
    type: boolean
    default: false
    displayName: Enable Monitoring (WAF)
    description: Enable Log Analytics and Application Insights
  enableScalability:
    type: boolean
    default: false
    displayName: Enable Scalability (WAF)
    description: Enable auto-scaling and higher SKUs
  enableRedundancy:
    type: boolean
    default: false
    displayName: Enable Redundancy (WAF)
    description: Enable zone redundancy and geo-replication
  enablePrivateNetworking:
    type: boolean
    default: false
    displayName: Enable Private Networking (WAF)
    description: Enable VNet integration and private endpoints

infra:
  provider: bicep
  path: ./infra
  module: main

workflows:
  up:
    steps:
      - azd: provision

hooks:
  postprovision:
    windows:
      run: |
        Write-Host "===== Provisioning Complete =====" -ForegroundColor Green
        Write-Host "Run the following two scripts, in order:" -ForegroundColor Yellow
        Write-Host "  1. Build and push the application images to ACR, then update the web app and container instance:" -ForegroundColor Yellow
        Write-Host "     ./infra/scripts/build_and_deploy_images.ps1" -ForegroundColor Cyan
        Write-Host "  2. Load the sample data into the application (run only after the previous script run has completed):" -ForegroundColor Yellow
        Write-Host "     python ./scripts/post_deploy.py --skip-tests" -ForegroundColor Cyan

        Write-Host ""
        Write-Host "Web app URL: " -NoNewline
        Write-Host "$env:WEB_APP_URL" -ForegroundColor Cyan
      shell: pwsh
      continueOnError: false
      interactive: true
    posix:
      run: |
        echo "===== Provisioning Complete ====="
        echo "Run the following two scripts, in order:"
        echo "  1. Build and push the application images to ACR, then update the web app and container instance:"
        echo "     bash ./infra/scripts/build_and_deploy_images.sh"
        echo "  2. Load the sample data into the application (run only after the previous script run has completed):"
        echo "     python ./scripts/post_deploy.py --skip-tests"

        echo ""
        echo "Web app URL: $WEB_APP_URL"
      shell: sh
      continueOnError: false
      interactive: true
